version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 1
    versioning-strategy: increase-if-necessary
    rebase-strategy: disabled
    labels:
      - dependencies
      - bun
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      bun-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: UTC
    open-pull-requests-limit: 1
    rebase-strategy: disabled
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
