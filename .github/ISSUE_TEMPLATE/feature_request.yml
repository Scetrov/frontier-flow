---
name: Feature Request
description: Suggest a new feature or improvement for Frontier Flow
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature or improvement? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution or how you'd expect the feature to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've thought about.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application does this relate to?
      options:
        - Canvas / Node Editor
        - Node Types / Primitives
        - Compilation / Code Generation
        - Deployment
        - Wallet Integration
        - UI / UX
        - Developer Experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, screenshots, references, or any other context.
    validations:
      required: false
