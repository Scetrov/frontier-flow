name: Real WASM Integration

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read

concurrency:
  group: real-wasm-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-wasm-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run real WASM compiler integration
        env:
          CI: true
        run: bun run test:real-wasm

      - name: Upload integration check artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: real-wasm-integration
          path: |
            test-results
          if-no-files-found: ignore